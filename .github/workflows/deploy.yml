name: Deploy to Strato

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 14

      - run: npm install

      - run: npx ember build --environment=production

      - name: Block search engines on test
        if: inputs.environment == 'test'
        run: |
          printf "User-agent: *\nDisallow: /\n" > ./dist/robots.txt

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.STRATO_HOST }}
          username: ${{ secrets.STRATO_USERNAME }}
          password: ${{ secrets.STRATO_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ inputs.environment == 'production' && 'main/' || 'test/' }}
          protocol: ftps
